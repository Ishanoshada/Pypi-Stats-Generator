name: Update PyPI Statistics

on:
  schedule:
    # Every 2 days at 00:00 UTC
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp pytz

    - name: Run PyPI Stats Generator
      run: python pypi_stats.py
      env:
        PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add data/*.json data/*.svg
        git commit -m "Auto-update PyPI stats [skip ci]" || echo "No changes to commit"
        git push